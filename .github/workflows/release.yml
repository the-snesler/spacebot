name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v0.1.0). Defaults to git ref."
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/spacebot

jobs:
  verify-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Git tag version:    $TAG"
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Git tag is v${TAG} but Cargo.toml has version ${CARGO_VERSION}. Bump the version in Cargo.toml before tagging."
            exit 1
          fi

  build-binaries:
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive: tar.gz
            os: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive: tar.gz
            os: linux
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
            os: macos
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
            os: macos
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos'
        run: brew install protobuf

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        env:
          SPACEBOT_SKIP_FRONTEND_BUILD: "1"
        run: |
          cd interface && rm -f bun.lock && bun install && cd ..
          ./scripts/build-opencode-embed.sh
          cd interface && bun run build

      - name: Determine version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(echo $GITHUB_SHA | head -c 7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p spacebot-${{ steps.version.outputs.version }}-${{ matrix.target }}
          cp spacebot spacebot-${{ steps.version.outputs.version }}-${{ matrix.target }}/
          tar -czvf ../../../spacebot-${{ steps.version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }} spacebot-${{ steps.version.outputs.version }}-${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacebot-${{ matrix.target }}
          path: spacebot-${{ steps.version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          retention-days: 1

  build-docker:
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="dev-$(echo $GITHUB_SHA | head -c 7)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Platform pair
        id: platform
        run: echo "pair=$(echo ${{ matrix.platform }} | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:build-${{ steps.platform.outputs.pair }}
          cache-from: type=gha,scope=build-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=build-${{ steps.platform.outputs.pair }}

  merge-docker:
    needs: build-docker
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ needs.build-docker.outputs.version }} \
            --tag ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:build-linux-amd64 \
            ${{ env.IMAGE }}:build-linux-arm64

      - name: Log in to Fly registry
        if: github.repository_owner == 'spacedriveapp'
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Push to Fly registry
        if: github.repository_owner == 'spacedriveapp'
        run: |
          docker buildx imagetools create \
            --tag registry.fly.io/spacebot-image:${{ needs.build-docker.outputs.version }} \
            --tag registry.fly.io/spacebot-image:latest \
            ${{ env.IMAGE }}:latest

      - name: Roll out to hosted instances
        if: github.repository_owner == 'spacedriveapp'
        run: |
          curl -sf -X POST https://api.spacebot.sh/api/admin/rollout \
            -H "Content-Type: application/json" \
            -H "X-Internal-Key: ${{ secrets.PLATFORM_INTERNAL_KEY }}" \
            -d '{"image_tag": "${{ needs.build-docker.outputs.version }}"}'

  create-release:
    needs:
      - build-binaries
      - merge-docker
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: spacebot-*
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find binaries -name "*.tar.gz" -exec cp {} release-assets/ \;
          find binaries -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-binaries.outputs.version }}
          generate_release_notes: true
          files: release-assets/*

  update-homebrew:
    needs:
      - build-binaries
      - create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          pattern: spacebot-*
          merge-multiple: false

      - name: Compute SHA256 checksums
        id: sha
        run: |
          for arch in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            FILE=$(find binaries -name "*${arch}*" | head -1)
            KEY=$(echo "$arch" | tr '-' '_')
            echo "${KEY}=$(shasum -a 256 "$FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          done

      - name: Update formula in tap repo
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.build-binaries.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/${VERSION}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/spacedriveapp/homebrew-tap.git" tap
          mkdir -p tap/Formula

          SHA_ARM_MAC="${{ steps.sha.outputs.aarch64_apple_darwin }}"
          SHA_X86_MAC="${{ steps.sha.outputs.x86_64_apple_darwin }}"
          SHA_ARM_LINUX="${{ steps.sha.outputs.aarch64_unknown_linux_gnu }}"
          SHA_X86_LINUX="${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}"

          # Write formula (sed strips 10 leading spaces from the YAML indentation)
          sed 's/^          //' > tap/Formula/spacebot.rb <<RUBY
          class Spacebot < Formula
            desc "Agentic LLM system with specialized processes"
            homepage "https://github.com/${REPO}"
            version "${VERSION_NUM}"
            license "FSL-1.1-ALv2"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE}/spacebot-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM_MAC}"
              else
                url "${BASE}/spacebot-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_MAC}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE}/spacebot-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_ARM_LINUX}"
              else
                url "${BASE}/spacebot-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_LINUX}"
              end
            end

            def install
              bin.install "spacebot"
            end

            test do
              assert_match "spacebot", shell_output("#{bin}/spacebot --version")
            end
          end
          RUBY

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/spacebot.rb
          git commit -m "spacebot ${VERSION}" || echo "No changes to commit"
          git push
